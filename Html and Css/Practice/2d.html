<html>
    <head>
        <title> Practice 2d </title>
        <style>
            .getstarted-button{
                background-color: blue;
                color: white;
                height: 40px;
                width: 120px;
                border-style: none;
                border-radius: 4px;
                font-weight: 700;
                cursor: pointer;
                margin-right: 4px;
                transition: background-color 0.2s;
            }
            .getstarted-button:Hover{
                background-color: rgb(15, 15, 173);
            }
            
            .download-button{
                background-color: white;
                color: rgb(129, 124, 124);
                height: 40px;
                width: 110px;
                border-style: solid;
                border-width: 1px;
                border-radius: 4px;
                border-color: rgb(129, 124, 124);
                font-weight: 700;
                margin-left: 4px;
                cursor: pointer;
                transition: background-color 0.2s, color 0.2s; 
            }
            .download-button:hover{
                background-color: rgb(129, 124, 124);
                color: white;
            }
        </style>
    </head>
    <body>
        <button class="getstarted-button"> Get Started </button>
        <button class="download-button"> Download </button>
    </body>
</html>

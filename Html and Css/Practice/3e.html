<html>
    <head>
        <title> Practice 3e </title>
        <style>
            .applyoncompanywebsite-button{
                background-color: rgb(26, 26, 216);
                color: white;
                padding-left: 30px;
                padding-right: 30px;
                padding-top: 15px;
                padding-bottom: 15px;
                border-radius: 18px;
                border-style: none;
                font-weight: bold;
                cursor: pointer;
                margin-right: 4px;
            }
            .applyoncompanywebsite-button:hover{
                background-color: blue;
            }
            .save-button{
                background-color: white;
                color: rgb(26, 26, 216);
                padding-left: 28px;
                padding-right: 28px;
                padding-top: 13px;
                padding-bottom: 13px;
                border-style: solid;
                border-width: 1px;
                border-color: rgb(26, 26, 216);
                border-radius: 18px;
                font-weight: bold;
                cursor: pointer;
                margin-left: 4px;
                vertical-align: top;
                transition: border-width 0.2s, opacity 0.2s;
            }
            .save-button:hover{
                border-width: 2px;
                opacity: 0.7;
            }
        </style>
    </head>
    <body>
        <button class="applyoncompanywebsite-button"> Apply on company website </button>
        <button class="save-button"> Save </button>
    </body>
</html>
